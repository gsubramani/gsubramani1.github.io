<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru Subramani</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #FBF9F5; color: #2F3337; font-family: ui-monospace, 'Cascadia Code', 'Segoe UI Mono', 'Liberation Mono', Menlo, Monaco, Consolas, monospace; font-size: 14px; line-height: 1.6; padding: 20px; font-weight: 500; max-width: 900px; margin: 0 auto; }
        header { margin-bottom: 30px; border-bottom: 2px solid #2F3337; padding-bottom: 15px; }
        .back-link { margin-bottom: 15px; }
        .paper-meta { margin-bottom: 15px; color: #666666; }
        .paper-meta .authors { font-style: italic; }
        .paper-meta .venue { font-weight: bold; color: #A85A41; }
        h1 { font-size: 24px; margin-bottom: 10px; color: #2F3337; line-height: 1.3; }
        h2 { font-size: 18px; margin-top: 25px; margin-bottom: 10px; color: #2F3337; }
        h3 { font-size: 16px; margin-top: 20px; margin-bottom: 8px; color: #2F3337; }
        a { color: #A85A41; text-decoration: none; border-bottom: 1px solid #A85A41; }
        a:hover { background-color: #A85A41; color: #FBF9F5; }
        section { margin-bottom: 25px; background-color: #F0EDE9; padding: 20px; }
        p { margin-bottom: 12px; }
        ul { margin-left: 20px; margin-bottom: 12px; }
        li { margin-bottom: 8px; }
        .figure { text-align: center; margin: 20px 0; }
        .figure img { max-width: 100%; height: auto; border: 1px solid #A85A41; }
        .figure-caption { margin-top: 8px; font-size: 12px; color: #666666; font-style: italic; }
        .figure-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        .figure-grid .figure { margin: 0; }
        .math { font-style: italic; color: #A85A41; }
        .highlight { background-color: #A85A41; color: #FBF9F5; padding: 2px 4px; border-radius: 2px; }
        footer { margin-top: 40px; border-top: 2px solid #2F3337; padding-top: 15px; text-align: center; font-size: 12px; color: #A0A0A0; }
        .external-links { margin-top: 20px; text-align: center; }
        .external-links a { margin: 0 10px; }
        @media (max-width: 720px) {
            body { padding: 14px; }
            .figure-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <noscript>
        <p>This site requires JavaScript to display content. Please enable JavaScript in your browser settings.</p>
    </noscript>
    <div id="app"></div>
    <script src="../../project-app.js"></script>
</body>
</html>
